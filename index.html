<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NOVA CRASHER+ V1 | LXFERTANONYMOUSXOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #000000);
            font-family: 'Segoe UI', 'Poppins', system-ui;
            color: #e0e0ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 80px;
        }
        
        /* LOADING OVERLAY */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid cyan;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: cyan;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* NOTIFICATION */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border-left: 3px solid cyan;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            z-index: 9998;
            display: none;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        
        .video-container {
            position: relative;
            width: 95%;
            margin: 12px auto 0 auto;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.5), 0 0 5px cyan;
        }
        
        .video-container video {
            width: 100%;
            height: 170px;
            object-fit: cover;
            display: block;
        }
        
        #musicToggle {
            position: absolute;
            bottom: 10px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            border: 1px solid cyan;
            border-radius: 50px;
            padding: 5px 10px;
            color: cyan;
            cursor: pointer;
            z-index: 99;
            font-weight: bold;
            font-size: 10px;
            backdrop-filter: blur(5px);
        }
        
        /* MAIN MENU - SPASI RAPI */
        .main-menu {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 15px 15px;
            padding: 8px 15px;
            background: rgba(5, 10, 25, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        
        .menu-btn {
            background: transparent;
            border: none;
            color: cyan;
            font-size: 14px;
            font-weight: bold;
            padding: 6px 18px;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .menu-btn:hover {
            background: rgba(0, 200, 255, 0.2);
        }
        
        .content-area {
            flex: 1;
            padding: 18px;
            background: rgba(0,0,0,0.4);
            margin: 5px 12px 20px 12px;
            border-radius: 28px;
            backdrop-filter: blur(4px);
            border-left: 2px solid cyan;
            border-right: 1px solid #2a3f6e;
            min-height: 400px;
        }
        
        .welcome-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .welcome-header h1 {
            font-size: 22px;
            background: linear-gradient(135deg, cyan, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        
        .welcome-header .timestamp {
            font-size: 10px;
            color: #6c8db0;
            font-family: monospace;
            margin-top: 5px;
        }
        
        .user-card {
            background: linear-gradient(135deg, rgba(0,20,50,0.8), rgba(0,10,30,0.9));
            border-radius: 25px;
            padding: 18px;
            margin: 12px 0;
            border: 1px solid rgba(0,255,255,0.3);
            text-align: center;
        }
        
        .user-avatar {
            font-size: 40px;
            margin-bottom: 8px;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: bold;
            color: cyan;
        }
        
        .user-role {
            background: rgba(0,255,255,0.15);
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin: 6px 0;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(0,255,0,0.15);
            border-radius: 20px;
            font-size: 10px;
            color: #0f0;
        }
        
        .joined-date {
            font-size: 11px;
            color: #8aaec0;
            margin: 8px 0;
        }
        
        .exit-btn {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 6px 20px;
            border-radius: 30px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 15px 0;
        }
        
        .stat-card {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.2);
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: cyan;
        }
        
        .stat-label {
            font-size: 10px;
            color: #8aaec0;
            margin-top: 4px;
        }
        
        button {
            background: linear-gradient(135deg, #0a1f2e, #021a2b);
            border: 1px solid #2f6f9f;
            color: cyan;
            padding: 8px 15px;
            border-radius: 35px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
            font-size: 12px;
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        input {
            background: #111a28;
            border: 1px solid #2c5270;
            padding: 10px;
            border-radius: 25px;
            color: white;
            margin: 6px 0;
            width: 100%;
            font-size: 12px;
        }
        
        .bottom-credit {
            text-align: center;
            padding: 8px 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, #010514 100%);
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 999;
        }
        
        .bottom-credit span {
            font-size: 10px;
            font-weight: 600;
            background: linear-gradient(135deg, #00ccff, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* DROPDOWN BUG MENU - GESER KEBAWAH */
        .bug-dropdown {
            margin: 8px 0;
            border-radius: 18px;
            overflow: hidden;
            background: rgba(0,20,40,0.4);
        }
        
        .bug-dropdown-header {
            background: rgba(0, 200, 255, 0.15);
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            border-radius: 18px;
            transition: 0.2s;
        }
        
        .bug-dropdown-header:hover {
            background: rgba(0, 200, 255, 0.25);
        }
        
        .bug-dropdown-header .arrow {
            transition: transform 0.3s;
            font-size: 16px;
        }
        
        .bug-dropdown-header.open .arrow {
            transform: rotate(180deg);
        }
        
        .bug-dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(0,0,0,0.3);
            border-radius: 0 0 18px 18px;
        }
        
        .bug-dropdown-content.open {
            max-height: 800px;
            transition: max-height 0.5s ease-in;
            padding: 12px;
        }
        
        .bug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        
        .bug-item {
            background: #0a1a2a;
            border: 1px solid cyan;
            border-radius: 18px;
            padding: 8px 10px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        
        .bug-item:hover {
            background: cyan;
            color: black;
        }
        
            .total-fitur {
            text-align: center;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            margin-bottom: 12px;
            font-size: 12px;
        }
        
        .total-fitur span {
            color: cyan;
            font-weight: bold;
        }
        
        .target-input {
            margin: 12px 0;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 18px;
        }
        
        .target-input h3 {
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .telegram-dashboard {
            background: linear-gradient(135deg, #0a1f2e, #001a2a);
            border: 1px solid #0088cc;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        
        .telegram-dashboard h3 {
            color: #0088cc;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .telegram-id {
            background: rgba(0,136,204,0.2);
            padding: 8px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .telegram-id span {
            color: cyan;
        }
        
        .project-footer {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border-top: 1px solid cyan;
        }
        
        .project-footer .project-name {
            font-size: 12px;
            font-weight: bold;
            color: cyan;
        }
        
        .project-footer .project-copyright {
            font-size: 9px;
            color: #6c8db0;
            margin-top: 4px;
        }
        
        hr {
            margin: 12px 0;
            border-color: cyan;
        }
        
        .active-timer {
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 10px;
            font-family: monospace;
            color: #0f0;
            border: 1px solid #0f0;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(3, 6, 14, 0.9);
            padding: 8px 12px;
            font-size: 9px;
            font-weight: bold;
            border-top: 1px solid #1e3a5f;
            color: #aad0ff;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .auth-card {
            background: rgba(0,20,40,0.6);
            border-radius: 22px;
            padding: 18px;
            margin: 12px 0;
        }
        
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .auth-tab.active {
            background: cyan;
            color: black;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .card-glow {
            background: rgba(0,20,40,0.6);
            border-radius: 22px;
            padding: 12px;
            margin: 12px 0;
        }
        
        .card-glow h3 {
            font-size: 13px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <!-- LOADING -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading System...</div>
    </div>
    
    <!-- NOTIFICATION -->
    <div class="notification" id="notification">Notification</div>
    
    <div class="glass-container">
        <div class="video-container">
            <video id="bgVideo" autoplay loop muted playsinline>
                <source src="assets/video/dashboard-bg.mp4" type="video/mp4">
            </video>
            <audio id="bgMusic" loop preload="auto">
                <source src="assets/audio/theme.mp3" type="audio/mpeg">
            </audio>
            <button id="musicToggle">MUSIC</button>
        </div>

        <!-- MAIN MENU -->
        <div class="main-menu">
            <button class="menu-btn" data-page="home">⌂ HOME</button>
            <button class="menu-btn" data-page="bug">⌬ MENU BUG</button>
            <button class="menu-btn" data-page="premium">⌥⌯ PREMIUM</button>
        </div>

        <div id="mainContent" class="content-area"></div>

        <div class="status-bar">
            <div>TIMER: <span id="appTimer" class="active-timer">00:00:00</span></div>
            <div>SENDER: <span id="activeSenderStatus">0</span></div>
            <div>USERS: <span id="activeUsersCount">677</span></div>
            <div>ROLE: <span id="userRole">FREE</span></div>
        </div>
        
        <div class="bottom-credit">
            <span>BY LXFERTANONYMOUSXOM</span>
        </div>
    </div>

    <script>
        // ========== NOVA CRASHER+ V1 ==========
        
        // 18 FITUR BUG
        const bugList = [
            "Delay", "DelayHard", "BlankHard", "ForceClose", "Crasher",
            "BlankChat", "BlankClickUI", "BlankDocument", "BlankFrezee", "BlankSistemUI",
            "CrashLovaVideo", "DelayBlankInis", "FcimageV1", "FcDelayV1", "FcNoClickOrClick",
            "ImageDelay", "StukingUi", "DelayBuldozer"
        ];
        
        function showNotif(msg, isError) {
            let notif = document.getElementById('notification');
            notif.style.display = 'block';
            notif.style.borderLeftColor = isError ? '#ff4444' : 'cyan';
            notif.innerText = msg;
            setTimeout(() => {
                notif.style.display = 'none';
            }, 2000);
        }
        
        function hideLoading() {
            let loading = document.getElementById('loadingOverlay');
            if(loading) {
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 500);
            }
        }
        
        // Database User
        let usersDB = [
            { username: "XPLOITCYBERSINGAPORE", password: "admin123", role: "OWNER", joinedDate: "5/26/2026" }
        ];
        
        let currentUser = null;
        let activeSenderNumber = null;
        let activeUsers = 0;
        let targetNumber = "";
        
        function saveSession() {
            if(currentUser) {
                localStorage.setItem('novaSession', JSON.stringify({
                    username: currentUser.username,
                    role: currentUser.role,
                    joinedDate: currentUser.joinedDate
                }));
            }
        }
        
        function loadSession() {
            let saved = localStorage.getItem('novaSession');
            if(saved) {
                let session = JSON.parse(saved);
                currentUser = session;
                return true;
            }
            return false;
        }
        
        function register(username, password) {
            if(usersDB.find(u => u.username === username)) {
                showNotif("Username sudah terdaftar", true);
                return false;
            }
            let newUser = {
                username: username,
                password: password,
                role: "All ROLE",
                joinedDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'numeric', day: 'numeric' })
            };
            usersDB.push(newUser);
            showNotif("Registrasi berhasil, silakan login");
            return true;
        }
        
        function login(username, password) {
            let user = usersDB.find(u => u.username === username && u.password === password);
            if(user) {
                currentUser = {
                    username: user.username,
                    role: user.role,
                    joinedDate: user.joinedDate
                };
                saveSession();
                updateDashboardUI();
                loadPage("home");
                showNotif("Selamat datang, " + username);
                return true;
            }
            showNotif("Username atau password salah", true);
            return false;
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('novaSession');
            updateDashboardUI();
            loadPage("home");
            showNotif("Anda telah logout");
        }
        
        function updateDashboardUI() {
            let roleSpan = document.getElementById("userRole");
            if(roleSpan) {
                roleSpan.innerText = currentUser ? currentUser.role : "GUEST";
            }
            let usersSpan = document.getElementById("activeUsersCount");
            if(usersSpan) usersSpan.innerText = activeUsers;
            let senderSpan = document.getElementById("activeSenderStatus");
            if(senderSpan) senderSpan.innerText = activeSenderNumber ? "1" : "0";
        }
        
        window.activateSender = function(number) {
            if(!number.startsWith("62")) {
                showNotif("Nomor harus diawali 62", true);
                return false;
            }
            activeSenderNumber = number;
            updateDashboardUI();
            showNotif("Sender aktif untuk " + number);
            return true;
        };
        
        window.deactivateSender = function() {
            activeSenderNumber = null;
            updateDashboardUI();
            showNotif("Sender dinonaktifkan");
        };
        
        window.executeBug = function(bugName) {
            if(!currentUser) {
                showNotif("Silakan login terlebih dahulu", true);
                return;
            }
            if(!targetNumber) {
                showNotif("Isi Number Target dulu", true);
                return;
            }
            if(!activeSenderNumber) {
                showNotif("Link WhatsApp sender dulu di menu Home", true);
                return;
            }
            let outputDiv = document.getElementById("bugOutput");
            let result = "[" + new Date().toLocaleTimeString() + "] " + bugName + " -> " + targetNumber;
            if(outputDiv) outputDiv.innerHTML = result;
            showNotif(bugName + " executed to " + targetNumber);
        };
        
        function updateDateTimeWIB() {
            let now = new Date();
            let hours = now.getHours().toString().padStart(2,'0');
            let minutes = now.getMinutes().toString().padStart(2,'0');
            let seconds = now.getSeconds().toString().padStart(2,'0');
            let days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
            let day = days[now.getDay()];
            let date = now.getDate();
            let month = now.getMonth() + 1;
            let year = now.getFullYear();
            
            let dateTimeStr = hours + "." + minutes + "." + seconds + " WIB " + day + ", " + date.toString().padStart(2,'0') + "/" + month.toString().padStart(2,'0') + "/" + year + " | COMMAND CENTER";
            let dateTimeSpan = document.getElementById("dateTimeDisplay");
            if(dateTimeSpan) dateTimeSpan.innerHTML = dateTimeStr;
        }
        
        let startTime = Date.now();
        function updateTimer() {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let hours = Math.floor(elapsed / 3600);
            let minutes = Math.floor((elapsed % 3600) / 60);
            let seconds = elapsed % 60;
            let timerSpan = document.getElementById("appTimer");
            if(timerSpan) {
                timerSpan.innerText = hours.toString().padStart(2,'0') + ":" + minutes.toString().padStart(2,'0') + ":" + seconds.toString().padStart(2,'0');
            }
            updateDateTimeWIB();
        }
        setInterval(updateTimer, 1000);
        updateTimer();
        
        function loadPage(page) {
            const container = document.getElementById("mainContent");
            
            if(page === "home") {
                if(!currentUser) {
                    container.innerHTML = `
                        <div class="welcome-header">
                            <h1>NOVA CRASHER V1</h1>
                            <div class="timestamp" id="dateTimeDisplay"></div>
                        </div>
                        
                        <div class="auth-card">
                            <div class="auth-tabs">
                                <div class="auth-tab active" data-tab="login">LOGIN</div>
                                <div class="auth-tab" data-tab="register">REGISTER</div>
                            </div>
                            
                            <div id="loginForm" class="auth-form active">
                                <input type="text" id="loginUsername" placeholder="Username">
                                <input type="password" id="loginPassword" placeholder="Password">
                                <button id="doLoginBtn">LOGIN</button>
                            </div>
                            
                                  <div id="registerForm" class="auth-form">
                                <input type="text" id="regUsername" placeholder="Username">
                                <input type="password" id="regPassword" placeholder="Password">
                                <input type="password" id="regConfirmPassword" placeholder="Konfirmasi Password">
                                <button id="doRegisterBtn">REGISTER</button>
                            </div>
                        </div>
                    `;
                    
                    document.querySelectorAll(".auth-tab").forEach(tab => {
                        tab.onclick = () => {
                            document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
                            tab.classList.add("active");
                            let target = tab.getAttribute("data-tab");
                            document.getElementById("loginForm").classList.toggle("active", target === "login");
                            document.getElementById("registerForm").classList.toggle("active", target === "register");
                        };
                    });
                    
                    document.getElementById("doLoginBtn")?.addEventListener("click", () => {
                        let user = document.getElementById("loginUsername").value;
                        let pass = document.getElementById("loginPassword").value;
                        if(user && pass) login(user, pass);
                    });
                    
                    document.getElementById("doRegisterBtn")?.addEventListener("click", () => {
                        let user = document.getElementById("regUsername").value;
                        let pass = document.getElementById("regPassword").value;
                        let confirm = document.getElementById("regConfirmPassword").value;
                        if(pass !== confirm) {
                            showNotif("Password tidak cocok", true);
                            return;
                        }
                        if(user && pass) register(user, pass);
                    });
                    
                } else {
                    container.innerHTML = `
                        <div class="welcome-header">
                            <h1>NOVA CRASHER V1</h1>
                            <div class="timestamp" id="dateTimeDisplay"></div>
                        </div>
                        
                        <div class="user-card">
                            <div class="user-avatar">★★</div>
                            <div class="user-name">${currentUser.username}</div>
                            <div class="user-role">${currentUser.role}</div>
                            <div class="status-badge">ACCOUNT STATUS SECURED & ACTIVE</div>
                            <div class="joined-date">JOINED SINCE<br>${currentUser.joinedDate}</div>
                            <button class="exit-btn" id="logoutBtn">EXIT LOGIN</button>
                        </div>
                        
                        <div class="stats-row">
                            <div class="stat-card">
                                <div class="stat-number">${activeUsers}</div>
                                <div class="stat-label">TOTAL USER</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="statSender">${activeSenderNumber ? "1" : "0"}</div>
                                <div class="stat-label">TOTAL SENDER</div>
                            </div>
                        </div>
                        
                        <div class="telegram-dashboard">
